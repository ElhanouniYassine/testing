<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden; /* Keeps the button from expanding the screen */
        }
        h1 {
            color: #d63031;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        img {
            width: 200px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .buttons {
            position: relative;
            width: 100%;
            height: 100px;
        }
        button {
            font-size: 1.2rem;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        #yes-btn {
            background-color: #55efc4;
            color: #2d3436;
            margin-right: 15px;
        }
        #no-btn {
            background-color: #ff7675;
            color: white;
            position: absolute;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h1>Are you ready to admit I'm the funniest person you know?</h1>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjEx...YOUR_GIF_HERE.../giphy.gif" alt="Cute gif">
        
        <div class="buttons">
            <button id="yes-btn">Yes, obviously</button>
            <button id="no-btn">No way</button>
        </div>
    </div>

    <div id="success-container" class="hidden">
        <h1>I knew it! ❤️</h1>
        <p>You're pretty awesome too.</p>
        <img src="https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif" alt="Happy gif">
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainContainer = document.getElementById('main-container');
        const successContainer = document.getElementById('success-container');

        // Function to move the button
        const moveButton = () => {
            // Get viewport dimensions
            const x = Math.random() * (window.innerWidth - noBtn.clientWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.clientHeight - 20);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        };

        // Move on hover (for desktop) and touch (for mobile)
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents the actual tap from registering
            moveButton();
        });

        // What happens when she clicks Yes
        yesBtn.addEventListener('click', () => {
            mainContainer.classList.add('hidden');
            successContainer.classList.remove('hidden');
            // Optional: You could trigger a confetti library here!
        });
    </script>
</body>
</html>
