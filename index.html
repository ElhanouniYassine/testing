<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden; 
        }
        h1 {
            color: #d63031;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        img {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .buttons {
            position: relative;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            font-size: 1.2rem;
            padding: 10px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
            z-index: 10;
        }
        #yes-btn {
            background-color: #55efc4;
            color: #2d3436;
        }
        #no-btn {
            background-color: #ff7675;
            color: white;
            position: relative; 
        }
        
        /* Full screen overlay for the cute threat */
        #warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h1>Douae , atkoni ghda fsbah frabat?</h1>
        <img src="https://media.giphy.com/media/26FPCXdkvDbKBbgOI/giphy.gif" alt="Cute please gif">
        
        <div class="buttons">
            <button id="yes-btn">Yes!</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <div id="success-container" class="hidden">
        <h1>Yay! It's a date 😂! ❤️</h1>
        <p>I can't wait.</p>
        <img src="https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif" alt="Happy gif">
    </div>

    <div id="warning-overlay" class="hidden">
        <h1>Stop trying to click no... 🔪</h1>
        <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExc3RodzY3NWhldnAxcDF4M2M5MHdzcWhpYWNuaTRsem8zYW1wNGl0eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/901mxGLGQN2PyCQpoc/giphy.gif" alt="Cute angry gif" style="width: 300px;">
    </div>

    <script>
        let escapeCount = 0;
        
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainContainer = document.getElementById('main-container');
        const successContainer = document.getElementById('success-container');
        const warningOverlay = document.getElementById('warning-overlay');

        const dodgeOrThreaten = (e) => {
            // Prevent default touch behavior so she can't just tap it easily on mobile
            if (e.type === 'touchstart') {
                e.preventDefault();
            }
            
            escapeCount++;

            // If she tries more than 3 times (on the 4th attempt)
            if (escapeCount > 3) {
                // Show the threatening overlay
                warningOverlay.classList.remove('hidden');
                
                // Hide it after 3.5 seconds and reset so she can finally click Yes
                setTimeout(() => {
                    warningOverlay.classList.add('hidden');
                    escapeCount = 0; 
                    
                    // Put the "No" button back to its original spot
                    noBtn.style.position = 'relative';
                    noBtn.style.left = 'auto';
                    noBtn.style.top = 'auto';
                }, 3500);

            } else {
                // Move the button away!
                noBtn.style.position = 'fixed';
                
                // Calculate random bounds safely within the window
                const maxX = window.innerWidth - noBtn.clientWidth - 20;
                const maxY = window.innerHeight - noBtn.clientHeight - 20;
                
                const x = Math.max(10, Math.random() * maxX);
                const y = Math.max(10, Math.random() * maxY);
                
                noBtn.style.left = `${x}px`;
                noBtn.style.top = `${y}px`;
            }
        };

        // Triggers for both desktop mice and mobile tapping
        noBtn.addEventListener('mouseover', dodgeOrThreaten);
        noBtn.addEventListener('touchstart', dodgeOrThreaten);

        // Success condition
        yesBtn.addEventListener('click', () => {
            mainContainer.classList.add('hidden');
            successContainer.classList.remove('hidden');
        });
    </script>
</body>
</html>
