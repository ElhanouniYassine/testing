<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden; 
        }
        h1 {
            color: #d63031;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        img {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .buttons {
            position: relative;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            font-size: 1.2rem;
            padding: 10px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
            z-index: 10;
        }
        #yes-btn {
            background-color: #55efc4;
            color: #2d3436;
        }
        #no-btn {
            background-color: #ff7675;
            color: white;
            position: relative; 
        }
        
        #warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h1>Douae , atkoni ghda fsbah frabat?</h1>
        <img src="https://media1.tenor.com/m/uPri0ET-RMwAAAAd/just-asking-sylvester-stallone.gif" alt="Cute please gif">
        
        <div class="buttons">
            <button id="yes-btn">Yes!</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <div id="success-container" class="hidden">
        <h1>Yay! It's a date 😂! ❤️</h1>
        <p>I can't wait.</p>
        <img src="https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif" alt="Happy gif">
    </div>

    <div id="warning-overlay" class="hidden">
        <h1 id="warning-text">Stop trying to click no... 🔪</h1>
        <img id="warning-img" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExc3RodzY3NWhldnAxcDF4M2M5MHdzcWhpYWNuaTRsem8zYW1wNGl0eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/901mxGLGQN2PyCQpoc/giphy.gif" alt="Cute angry gif" style="width: 300px;">
    </div>

    <script>
        let escapeCount = 0;
        let threatIndex = 0; 
        
        const threats = [
            {
                text: "matbrkich 3la no... 🔪",
                img: "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExc3RodzY3NWhldnAxcDF4M2M5MHdzcWhpYWNuaTRsem8zYW1wNGl0eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/901mxGLGQN2PyCQpoc/giphy.gif"
            },
            {
                text: "imkn bghiti tbrki 3la yes gha nssiti YK 🥊😾",
                img: "https://media1.tenor.com/m/KUv0IXThX3cAAAAC/getyoahhpunched-cat.gif"
            },
            {
                text: "GHANHAKILIK TELEPHONE ILA MABRKTICH 3LA YES 😼",
                img: "https://media1.tenor.com/m/qAd9rGHQhQQAAAAd/silly-cat-cat.gif"
            }
        ];

        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainContainer = document.getElementById('main-container');
        const successContainer = document.getElementById('success-container');
        const warningOverlay = document.getElementById('warning-overlay');
        const warningText = document.getElementById('warning-text');
        const warningImg = document.getElementById('warning-img');

        const dodgeOrThreaten = (e) => {
            if (e.type === 'touchstart') {
                e.preventDefault();
            }
            
            escapeCount++;

            if (escapeCount > 3) {
                warningText.innerText = threats[threatIndex].text;
                warningImg.src = threats[threatIndex].img;

                warningOverlay.classList.remove('hidden');
                
                threatIndex = (threatIndex + 1) % threats.length; 
                
                setTimeout(() => {
                    warningOverlay.classList.add('hidden');
                    escapeCount = 0; 
                    
                    noBtn.style.position = 'relative';
                    noBtn.style.left = 'auto';
                    noBtn.style.top = 'auto';
                }, 3500);

            } else {
                noBtn.style.position = 'fixed';
                
                const maxX = window.innerWidth - noBtn.clientWidth - 20;
                const maxY = window.innerHeight - noBtn.clientHeight - 20;
                
                const x = Math.max(10, Math.random() * maxX);
                const y = Math.max(10, Math.random() * maxY);
                
                noBtn.style.left = `${x}px`;
                noBtn.style.top = `${y}px`;
            }
        };

        noBtn.addEventListener('mouseover', dodgeOrThreaten);
        noBtn.addEventListener('touchstart', dodgeOrThreaten);

        // 🎇 HERE IS WHERE WE FIRE THE CONFETTI WHEN SHE CLICKS YES
        yesBtn.addEventListener('click', () => {
            mainContainer.classList.add('hidden');
            successContainer.classList.remove('hidden');
            
            // This code creates a massive burst of confetti from the center!
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ff7675', '#55efc4', '#ffe6e6', '#d63031']
            });
        });
    </script>
</body>
</html>
