<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden; 
        }
        h1 {
            color: #d63031;
            margin-bottom: 20px;
            padding: 0 20px;
            height: 60px; /* Keeps the layout from jumping when text changes */
        }
        img {
            width: 280px;
            border-radius: 15px;
            margin-bottom: 30px;
            object-fit: cover;
        }
        .buttons {
            position: relative;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            font-size: 1.2rem;
            padding: 10px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
            z-index: 10;
        }
        #yes-btn {
            background-color: #55efc4;
            color: #2d3436;
        }
        #no-btn {
            background-color: #ff7675;
            color: white;
            position: relative; 
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h1 id="main-title">Are you free for a date this weekend?</h1>
        
        <img id="main-img" src="https://media.giphy.com/media/26FPCXdkvDbKBbgOI/giphy.gif" alt="Cute gif">
        
        <div class="buttons">
            <button id="yes-btn">Yes!</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <div id="success-container" class="hidden">
        <h1>Yay! I knew you'd say yes! ❤️</h1>
        <p>I can't wait.</p>
        <img src="https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif" alt="Happy gif">
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainContainer = document.getElementById('main-container');
        const successContainer = document.getElementById('success-container');
        const mainTitle = document.getElementById('main-title');
        const mainImg = document.getElementById('main-img');

        const dodgeAndThreaten = (e) => {
            // Prevent default touch behavior on mobile
            if (e.type === 'touchstart') {
                e.preventDefault();
            }
            
            // 1. INSTANTLY SWAP THE IMAGE TO YOUR THREATENING GIF
            mainImg.src = "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExc3RodzY3NWhldnAxcDF4M2M5MHdzcWhpYWNuaTRsem8zYW1wNGl0eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/901mxGLGQN2PyCQpoc/giphy.gif";
            
            // 2. CHANGE THE TEXT
            mainTitle.innerText = "Don't even think about it... 🔪";
            
            // 3. MOVE THE BUTTON AWAY
            noBtn.style.position = 'fixed';
            
            // Calculate random bounds safely within the window
            const maxX = window.innerWidth - noBtn.clientWidth - 20;
            const maxY = window.innerHeight - noBtn.clientHeight - 20;
            
            const x = Math.max(10, Math.random() * maxX);
            const y = Math.max(10, Math.random() * maxY);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        };

        // Triggers for both desktop mice and mobile tapping
        noBtn.addEventListener('mouseover', dodgeAndThreaten);
        noBtn.addEventListener('touchstart', dodgeAndThreaten);

        // Success condition
        yesBtn.addEventListener('click', () => {
            mainContainer.classList.add('hidden');
            successContainer.classList.remove('hidden');
        });
    </script>
</body>
</html>
